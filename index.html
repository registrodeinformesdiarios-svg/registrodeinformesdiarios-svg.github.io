<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Herramientas | Equipo de Supervisión</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: #f8fafc; min-height:100vh; display:flex; flex-direction:column; }

        header {
            background: linear-gradient(135deg, #1e293b 0%, #334155 100%);
            padding: 52px 24px;
            text-align: center;
            box-shadow: 0 4px 16px rgba(0,0,0,.18);
        }
        header h1 { font-size: clamp(1.9rem, 4vw, 3rem); font-weight: 800; color: #fff; letter-spacing: -.02em; margin-bottom: 12px; }
        header p { font-size: clamp(.95rem, 1.5vw, 1.15rem); color: #94a3b8; font-weight: 300; max-width: 560px; margin: 0 auto; line-height: 1.6; }

        nav {
            background: #fff;
            border-bottom: 1px solid #e2e8f0;
            position: sticky;
            top: 0;
            z-index: 30;
            overflow-x: auto;
            scrollbar-width: none;
        }
        nav::-webkit-scrollbar { display: none; }
        .tab-list { display: flex; max-width: 1100px; margin: 0 auto; padding: 0 28px; white-space: nowrap; }
        .tab-btn { font-size: .875rem; font-weight: 500; color: #64748b; padding: 16px 18px; border: none; border-bottom: 3px solid transparent; background: none; cursor: pointer; transition: color .15s, border-color .15s; white-space: nowrap; }
        .tab-btn:hover { color: #1e40af; }
        .tab-active { color: #1e40af !important; border-bottom-color: #3b82f6 !important; font-weight: 700; }

        main { flex: 1; padding: 40px 28px 48px; max-width: 1100px; width: 100%; margin: 0 auto; }
        #project-title { font-size: 1.75rem; font-weight: 700; color: #1e293b; margin-bottom: 24px; }

        /* ── Favorites carousel ── */
        .fav-section { margin-bottom: 32px; }
        .fav-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
        .fav-title {
            font-size: .7rem; font-weight: 700; text-transform: uppercase;
            letter-spacing: .1em; color: #94a3b8;
            display: flex; align-items: center; gap: 7px;
        }
        .fav-title svg { width: 14px; height: 14px; color: #f59e0b; fill: #f59e0b; }
        .fav-edit-btn { display: none; }

        .fav-track-wrap { overflow: hidden; position: relative; }
        .fav-track {
            display: flex;
            gap: 14px;
            overflow-x: auto;
            padding-bottom: 10px;
            scroll-behavior: smooth;
            scrollbar-width: thin;
            scrollbar-color: #cbd5e1 transparent;
            -webkit-overflow-scrolling: touch;
        }
        .fav-track::-webkit-scrollbar { height: 5px; }
        .fav-track::-webkit-scrollbar-track { background: transparent; }
        .fav-track::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

        .fav-card {
            flex: 0 0 200px;
            background: #fff;
            border: 1px solid #e2e8f0;
            border-radius: 14px;
            padding: 20px 18px 16px;
            display: flex;
            flex-direction: column;
            transition: transform .25s cubic-bezier(.4,0,.2,1), box-shadow .25s;
            position: relative;
            text-decoration: none;
        }
        .fav-card:not(.fav-editing):hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 24px -6px rgba(0,0,0,.1);
        }

        .fav-remove-btn {
            position: absolute; top: 8px; right: 8px;
            width: 22px; height: 22px; border-radius: 50%;
            background: #ef4444; color: #fff; border: none; cursor: pointer;
            display: none; align-items: center; justify-content: center;
            font-size: 13px; font-weight: 700; line-height: 1;
            transition: transform .1s;
        }
        .fav-remove-btn:hover { transform: scale(1.15); }
        .fav-remove-btn svg { width: 11px; height: 11px; }
        .editing-mode .fav-remove-btn { display: flex; }
        .editing-mode .fav-card { cursor: default; border-style: dashed; }

        .fav-icon { width: 42px; height: 42px; border-radius: 11px; display: flex; align-items: center; justify-content: center; margin-bottom: 13px; flex-shrink: 0; }
        .fav-icon svg { width: 20px; height: 20px; }
        .fav-name { font-size: .82rem; font-weight: 700; color: #1e293b; margin-bottom: 5px; line-height: 1.3; }
        .fav-desc { font-size: .7rem; color: #64748b; line-height: 1.5; flex: 1; margin-bottom: 13px; }
        .fav-btn {
            display: inline-flex; align-items: center; justify-content: center; gap: 5px;
            padding: 7px 13px; border-radius: 8px;
            font-size: .72rem; font-weight: 600;
            text-decoration: none; border: none; cursor: pointer;
            transition: filter .15s;
            pointer-events: none;
        }
        .fav-card:not(.editing-mode):hover .fav-btn { filter: brightness(1.08); }
        .fav-btn svg { width: 11px; height: 11px; }

        .fav-empty {
            flex: 0 0 200px; background: #f8fafc; border: 2px dashed #e2e8f0;
            border-radius: 14px; padding: 24px 18px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            gap: 8px; color: #94a3b8; font-size: .78rem; text-align: center;
        }
        .fav-empty svg { width: 24px; height: 24px; opacity: .4; }

        /* ── Section accordion ── */
        .sec-group { background: #fff; border: 1px solid #e2e8f0; border-radius: 14px; margin-bottom: 10px; overflow: hidden; }
        .sec-toggle { width: 100%; display: flex; align-items: center; gap: 14px; padding: 16px 20px; cursor: pointer; background: none; border: none; border-bottom: 1px solid transparent; text-align: left; transition: background .12s; }
        .sec-toggle:hover { background: #f8fafc; }
        .sec-open .sec-toggle { border-bottom-color: #e8edf5; }
        .sec-dot { width: 36px; height: 36px; border-radius: 9px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .sec-dot svg { width: 18px; height: 18px; }
        .sec-meta { flex: 1; min-width: 0; }
        .sec-label { font-size: .65rem; font-weight: 700; text-transform: uppercase; letter-spacing: .1em; margin-bottom: 3px; }
        .sec-name { font-size: .95rem; font-weight: 700; color: #1e293b; }
        .sec-pill { font-size: .7rem; font-weight: 700; padding: 3px 10px; border-radius: 20px; flex-shrink: 0; }
        .chevron { width: 16px; height: 16px; flex-shrink: 0; color: #94a3b8; transition: transform .25s cubic-bezier(.4,0,.2,1); }
        .chevron svg { width: 16px; height: 16px; }
        .sec-open .chevron { transform: rotate(180deg); }
        .sec-body { display: none; padding: 18px; }
        .sec-open .sec-body { display: block; }

        /* ── Tool cards ── */
        .tools-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 16px; }
        .tool-card { background: #fff; border: 1px solid #e2e8f0; border-radius: 16px; padding: 28px 24px 22px; display: flex; flex-direction: column; transition: transform .3s cubic-bezier(.4,0,.2,1), box-shadow .3s; position: relative; }
        .tool-card:hover { transform: translateY(-5px); box-shadow: 0 20px 30px -8px rgba(0,0,0,.12); }
        .tool-card.dis { opacity: .38; pointer-events: none; }
        .tc-icon { width: 54px; height: 54px; border-radius: 14px; display: flex; align-items: center; justify-content: center; margin-bottom: 18px; flex-shrink: 0; }
        .tc-icon svg { width: 26px; height: 26px; }
        .tc-name { font-size: 1.05rem; font-weight: 700; color: #1e293b; margin-bottom: 8px; line-height: 1.3; }
        .tc-desc { font-size: .85rem; color: #64748b; line-height: 1.6; flex: 1; margin-bottom: 18px; }
        .tc-btn { display: inline-flex; align-items: center; justify-content: center; gap: 7px; padding: 10px 18px; border-radius: 10px; font-size: .82rem; font-weight: 600; text-decoration: none; border: none; cursor: pointer; transition: filter .15s, transform .1s; }
        .tc-btn:hover { filter: brightness(1.08); }
        .tc-btn:active { transform: scale(.97); }
        .tc-btn svg { width: 14px; height: 14px; flex-shrink: 0; }

        /* Add-to-fav button on tool card */
        .fav-toggle-btn {
            position: absolute; top: 12px; right: 12px;
            background: none; border: none; cursor: pointer;
            padding: 4px; border-radius: 6px;
            color: #cbd5e1; transition: color .15s, transform .15s;
        }
        .fav-toggle-btn:hover { color: #f59e0b; transform: scale(1.2); }
        .fav-toggle-btn.is-fav { color: #f59e0b; }
        .fav-toggle-btn svg { width: 18px; height: 18px; }

        /* ── Section color themes ── */
        .s-blue .sec-dot  { background:#eff6ff; color:#2563eb; } .s-blue .sec-label { color:#3b82f6; } .s-blue .sec-pill { background:#eff6ff; color:#2563eb; } .s-blue .tc-icon, .s-blue .fav-icon { background:#eff6ff; color:#2563eb; } .s-blue .tc-btn, .s-blue .fav-btn { background:#2563eb; color:#fff; }
        .s-violet .sec-dot { background:#f5f3ff; color:#7c3aed; } .s-violet .sec-label { color:#7c3aed; } .s-violet .sec-pill { background:#f5f3ff; color:#7c3aed; } .s-violet .tc-icon, .s-violet .fav-icon { background:#f5f3ff; color:#7c3aed; } .s-violet .tc-btn, .s-violet .fav-btn { background:#7c3aed; color:#fff; }
        .s-green .sec-dot  { background:#f0fdf4; color:#16a34a; } .s-green .sec-label { color:#16a34a; } .s-green .sec-pill { background:#f0fdf4; color:#16a34a; } .s-green .tc-icon, .s-green .fav-icon { background:#f0fdf4; color:#16a34a; } .s-green .tc-btn, .s-green .fav-btn { background:#16a34a; color:#fff; }
        .s-amber .sec-dot  { background:#fffbeb; color:#d97706; } .s-amber .sec-label { color:#d97706; } .s-amber .sec-pill { background:#fffbeb; color:#d97706; } .s-amber .tc-icon, .s-amber .fav-icon { background:#fffbeb; color:#d97706; } .s-amber .tc-btn, .s-amber .fav-btn { background:#d97706; color:#fff; }
        .s-rose .sec-dot   { background:#fff1f2; color:#e11d48; } .s-rose .sec-label  { color:#e11d48; } .s-rose .sec-pill  { background:#fff1f2; color:#e11d48; } .s-rose .tc-icon, .s-rose .fav-icon  { background:#fff1f2; color:#e11d48; } .s-rose .tc-btn, .s-rose .fav-btn  { background:#e11d48; color:#fff; }

        footer { background:#fff; border-top:1px solid #e2e8f0; padding:28px; font-size:.82rem; color:#94a3b8; display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:10px; margin-top:12px; }
        footer a { color:#94a3b8; text-decoration:none; transition:color .15s; }
        footer a:hover { color:#475569; }

        @media(max-width:640px){ main{padding:28px 16px 36px;} .tab-list{padding:0 12px;} .tab-btn{padding:14px 12px; font-size:.8rem;} header{padding:36px 20px;} .fav-card{flex:0 0 170px;} }
        @media(max-width:420px){ .tools-grid{grid-template-columns:1fr;} }
    </style>
</head>

    layers:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></svg>`,
    chev:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>`,
    ext:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>`,
    star:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>`,
    starFill:`<svg viewBox="0 0 24 24" fill="#f59e0b" stroke="#f59e0b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>`,
    minus:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"><line x1="5" y1="12" x2="19" y2="12"/></svg>`
};

// Default favorites (tool IDs)
const DEFAULT_FAVS = ['watermark','visualizadorFotos','curveS','viaticos'];
const LS_KEY = 'svgpanel_favorites';

function loadFavs() {
    try {
        const s = localStorage.getItem(LS_KEY);
        return s ? JSON.parse(s) : [...DEFAULT_FAVS];
    } catch(e) { return [...DEFAULT_FAVS]; }
}
function saveFavs(f) {
    try { localStorage.setItem(LS_KEY, JSON.stringify(f)); } catch(e){}
}

let favs = loadFavs();
let isEditing = false;
let currentProject = 'tecales';

function allTools(p) {
    return [
        {id:'form',           name:'Formulario de reporte',       desc:'Datos de campo vía Google Forms.',                              icon:I.form,   color:'s-blue',   btn:'Abrir formulario',    url:p.form},
        {id:'watermark',      name:'Subir fotos con marca',       desc:'Aplica marca de agua de supervisión.',                          icon:I.stamp,  color:'s-blue',   btn:'Acceder',             url:p.watermark},
        {id:'curveS',         name:'Curva S',                     desc:'Progreso del proyecto vs. cronograma.',                         icon:I.trend,  color:'s-violet', btn:'Abrir seguimiento',   url:p.curveS},
        {id:'reports',        name:'Informes periódicos',         desc:'Generador automático de informes.',                             icon:I.file,   color:'s-violet', btn:'Generar informe',     url:p.reports},
        {id:'kilometraje',    name:'Kilometraje',                 desc:'Registro de kilometraje y cierre de día.',                      icon:I.car,    color:'s-green',  btn:'Registrar cierre',    url:p.kilometraje},
        {id:'viaticos',       name:'Viáticos',                    desc:'Control de gastos de viático.',                                 icon:I.wallet, color:'s-green',  btn:'Registrar gastos',    url:p.viaticos},
        {id:'visualizador3D', name:'Visualizador 3D',             desc:'Modelo tridimensional interactivo.',                            icon:I.box,    color:'s-amber',  btn:'Explorar modelo',     url:p.visualizador3D},
        {id:'visualizadorFotos',name:'Galería de fotos',          desc:'Imágenes en alta resolución.',                                  icon:I.img,    color:'s-amber',  btn:'Ver galería',         url:p.visualizadorFotos},
        {id:'generadorPresentaciones',name:'Generador de presentaciones',desc:'Presentaciones automáticas de fotos.',                   icon:I.slides, color:'s-rose',   btn:'Comenzar generación', url:p.generadorPresentaciones},
        {id:'gestorDePlanos', name:'Gestor de planos técnicos',   desc:'Planimetría, alzados y detalles técnicos.',                     icon:I.layers, color:'s-rose',   btn:'Ver planos',          url:p.gestorDePlanos},
    ];
}

function getSections(p) {
    const t = allTools(p);
    const byId = {};
    t.forEach(x => byId[x.id] = x);
    return [
        {id:'reg',   color:'s-blue',   label:'Trabajo de campo',      name:'Registro diario',          icon:I.form,   tools:[byId.form, byId.watermark]},
        {id:'seg',   color:'s-violet', label:'Avance del proyecto',   name:'Seguimiento y reportes',   icon:I.trend,  tools:[byId.curveS, byId.reports]},
        {id:'gas',   color:'s-green',  label:'Control de costos',     name:'Gastos y movilización',    icon:I.wallet, tools:[byId.kilometraje, byId.viaticos]},
        {id:'vis',   color:'s-amber',  label:'Exploración visual',    name:'Visualización',            icon:I.box,    tools:[byId.visualizador3D, byId.visualizadorFotos]},
        {id:'doc',   color:'s-rose',   label:'Documentación técnica', name:'Documentos y planos',      icon:I.layers, tools:[byId.generadorPresentaciones, byId.gestorDePlanos]},
    ];
}

// ── Favorites carousel ────────────────────────────────────────
function renderFavs() {
    const p = P[currentProject];
    const tools = allTools(p);
    const byId = {};
    tools.forEach(x => byId[x.id] = x);

    const track = document.getElementById('fav-track');
    const editBtn = document.getElementById('fav-edit-btn');

    if (isEditing) {
        editBtn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg> Listo`;
        editBtn.classList.add('editing');
    } else {
        editBtn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg> Editar`;
        editBtn.classList.remove('editing');
    }

    if (favs.length === 0) {
        track.innerHTML = `<div class="fav-empty">${I.star}<span>Sin favoritos.<br>Agrega con ★ en las tarjetas.</span></div>`;
        return;
    }

    track.innerHTML = favs.map(id => {
        const t = byId[id];
        if (!t) return '';
        const d = !t.url || t.url === '#';
        return `
        <div class="fav-card ${t.color} ${isEditing ? 'fav-editing' : ''}" ${d||isEditing ? '' : `onclick="window.open('${t.url}','_blank')" style="cursor:pointer"`}>
            ${isEditing ? `<button class="fav-remove-btn" onclick="event.stopPropagation();removeFav('${id}')" title="Quitar de favoritos">${I.minus}</button>` : ''}
            <div class="fav-icon">${t.icon}</div>
            <div class="fav-name">${t.name}</div>
            <div class="fav-desc">${t.desc}</div>
            <div class="fav-btn">${t.btn} ${I.ext}</div>
        </div>`;
    }).join('');
}

function removeFav(id) {
    favs = favs.filter(f => f !== id);
    saveFavs(favs);
    renderFavs();
    renderSections(); // refresh star states
}

function toggleFav(id) {
    if (favs.includes(id)) {
        favs = favs.filter(f => f !== id);
    } else {
        favs.push(id);
    }
    saveFavs(favs);
    renderFavs();
    renderSections();
}

function toggleEdit() {
    isEditing = !isEditing;
    renderFavs();
}

// ── Sections ──────────────────────────────────────────────────
function tCard(t) {
    const d = !t.url || t.url === '#';
    const isFav = favs.includes(t.id);
    return `<div class="tool-card ${t.color} ${d ? 'dis' : ''}">
        <button class="fav-toggle-btn ${isFav ? 'is-fav' : ''}" onclick="toggleFav('${t.id}')" title="${isFav ? 'Quitar de favoritos' : 'Agregar a favoritos'}">
            ${isFav ? I.starFill : I.star}
        </button>
        <div class="tc-icon">${t.icon}</div>
        <div class="tc-name">${t.name}</div>
        <div class="tc-desc">${t.desc}</div>
        <a href="${d ? '#' : t.url}" ${d ? '' : 'target="_blank"'} class="tc-btn">${t.btn} ${I.ext}</a>
    </div>`;
}

function renderSections() {
    const p = P[currentProject];
    document.getElementById('wrap').innerHTML = getSections(p).map(s => `
    <div class="sec-group ${s.color}" id="s-${s.id}">
        <button class="sec-toggle" onclick="tog('${s.id}')">
            <div class="sec-dot">${s.icon}</div>
            <div class="sec-meta"><div class="sec-label">${s.label}</div><div class="sec-name">${s.name}</div></div>
            <span class="sec-pill">${s.tools.length} herramientas</span>
            <div class="chevron">${I.chev}</div>
        </button>
        <div class="sec-body"><div class="tools-grid">${s.tools.map(tCard).join('')}</div></div>
    </div>`).join('');
}

function tog(id) {
    document.getElementById('s-' + id).classList.toggle('sec-open');
}

function go(id) {
    currentProject = id;
    document.getElementById('project-title').textContent = P[id].title;
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('tab-active'));
    document.getElementById('btn-' + id).classList.add('tab-active');
    renderFavs();
    renderSections();
}

window.onload = () => go('tecales');
</script>
</body>
</html>
