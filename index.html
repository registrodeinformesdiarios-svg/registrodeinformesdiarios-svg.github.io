<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Herramientas | Equipo de Supervisión</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons para los iconos descriptivos -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
        }

        .tool-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .tool-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }

        .gradient-bg {
            background: linear-gradient(135deg, #1e293b 0%, #334155 100%);
        }

        .tab-active {
            border-bottom: 3px solid #3b82f6;
            color: #1e40af;
            font-weight: 700;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <!-- Header / Hero Section -->
    <header class="gradient-bg text-white py-12 px-6 shadow-lg">
        <div class="max-w-6xl mx-auto text-center">
            <h1 class="text-4xl md:text-5xl font-extrabold mb-4 tracking-tight">
                Herramientas de Supervisión
            </h1>
            <p class="text-slate-300 text-lg md:text-xl max-w-2xl mx-auto font-light">
                Panel centralizado por proyecto para la gestión operativa del equipo supervisor.
            </p>
        </div>
    </header>

    <!-- Project Navigation Tabs -->
    <nav class="bg-white border-b border-slate-200 sticky top-0 z-10 overflow-x-auto">
        <div class="max-w-6xl mx-auto px-6">
            <ul class="flex space-x-8 text-sm font-medium text-slate-500 whitespace-nowrap">
                <li><button onclick="showProject('numu')" id="btn-numu" class="py-4 px-2 tab-btn">1. PS Numu</button></li>
                <li><button onclick="showProject('tecales')" id="btn-tecales" class="py-4 px-2 tab-btn tab-active">2. PS Los Tecales</button></li>
                <li><button onclick="showProject('canas')" id="btn-canas" class="py-4 px-2 tab-btn">3. PS Cañas</button></li>
                <li><button onclick="showProject('inolasa')" id="btn-inolasa" class="py-4 px-2 tab-btn">4. Inolasa</button></li>
                <li><button onclick="showProject('boston')" id="btn-boston" class="py-4 px-2 tab-btn">5. Boston Sc.</button></li>
                <li><button onclick="showProject('colorado')" id="btn-colorado" class="py-4 px-2 tab-btn">6. Colorado</button></li>
            </ul>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="flex-grow py-12 px-6">
        <div class="max-w-6xl mx-auto">
            
            <h2 id="project-title" class="text-3xl font-bold text-slate-800 mb-8">2. PS Los Tecales</h2>

            <div id="tools-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                <!-- El contenido se genera dinámicamente con JavaScript -->
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-white border-t border-slate-200 py-8 px-6 mt-12">
        <div class="max-w-6xl mx-auto flex flex-col md:flex-row justify-between items-center text-slate-500 text-sm">
            <p>&copy; 2026 Equipo de Supervisión. Todos los derechos reservados.</p>
            <div class="flex space-x-6 mt-4 md:mt-0">
                <a href="https://github.com/registrodeinformesdiarios-svg/registrodeinformesdiarios-svg.github.io/blob/main/Manual%20de%20usuario.pdf" class="hover:text-slate-800 transition-colors">Manual de Usuario</a>
                <a href="https://github.com/registrodeinformesdiarios-svg/registrodeinformesdiarios-svg.github.io/blob/main/Manual%20de%20usuario.pdf" class="hover:text-slate-800 transition-colors">Soporte Técnico</a>
            </div>
        </div>
    </footer>

    <script>
        // Configuración de proyectos y sus enlaces
        const projects = {
            'numu': {
                title: '1. PS Numu',
                form: '#',
                watermark: '#',
                reports: '#',
                curveS: '#'
            },
            'tecales': {
                title: '2. PS Los Tecales',
                form: 'https://docs.google.com/forms/d/e/1FAIpQLScnnyrYdjsp68DlC6RQa5v2ovD3as3yGlasiKuPUOb_ogXuLQ/viewform',
                watermark: 'https://registrodeinformesdiarios-svg.github.io/marcas-agua-supervision/',
                reports: '#',
                curveS: 'https://registrodeinformesdiarios-svg.github.io/CurvaS/',
                kilometraje: 'https://docs.google.com/forms/d/e/1FAIpQLSfG9wMSAEXpbI4jzXTq24nWrLYi1wRwZPy2CC6GE5M-kf-2-w/viewform'
            },
            'canas': {
                title: '3. PS Cañas',
                form: '#',
                watermark: '#',
                reports: '#',
                curveS: '#',
                kilometraje: '#'
            },
            'inolasa': {
                title: '4. Inolasa',
                form: '#',
                watermark: '#',
                reports: '#',
                curveS: '#',
                kilometraje: '#'
            },
            'boston': {
                title: '5. Boston Sc.',
                form: '#',
                watermark: '#',
                reports: '#',
                curveS: '#',
                kilometraje: '#'
            },
            'colorado': {
                title: '6. Colorado',
                form: '#',
                watermark: '#',
                reports: '#',
                curveS: '#',
                kilometraje: '#'
            }
        };

        function showProject(projectId) {
            const project = projects[projectId];
            document.getElementById('project-title').innerText = project.title;
            
            // Actualizar botones de navegación
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('tab-active'));
            document.getElementById('btn-' + projectId).classList.add('tab-active');

            const container = document.getElementById('tools-container');
            container.innerHTML = `
                <!-- Formulario -->
                <div class="tool-card bg-white rounded-2xl p-8 border border-slate-200 flex flex-col h-full">
                    <div class="mb-6 flex items-center justify-center w-16 h-16 bg-blue-50 text-blue-600 rounded-xl">
                        <i data-lucide="clipboard-list" class="w-8 h-8"></i>
                    </div>
                    <h2 class="text-2xl font-bold text-slate-800 mb-3">Formulario de Reporte</h2>
                    <p class="text-slate-600 mb-8 flex-grow">Acceso directo al formulario oficial de Google para la recopilación de datos de campo en ${project.title}.</p>
                    <a href="${project.form}" target="_blank" class="inline-flex items-center justify-center px-6 py-3 border border-transparent text-base font-medium rounded-lg text-white bg-blue-600 hover:bg-blue-700 transition-colors">
                        Abrir Formulario <i data-lucide="external-link" class="ml-2 w-4 h-4"></i>
                    </a>
                </div>

                <!-- Marcas de Agua -->
                <div class="tool-card bg-white rounded-2xl p-8 border border-slate-200 flex flex-col h-full">
                    <div class="mb-6 flex items-center justify-center w-16 h-16 bg-emerald-50 text-emerald-600 rounded-xl">
                        <i data-lucide="image" class="w-8 h-8"></i>
                    </div>
                    <h2 class="text-2xl font-bold text-slate-800 mb-3">Marcas de Agua</h2>
                    <p class="text-slate-600 mb-8 flex-grow">Subir fotografías y aplicar marca de agua de supervisión para el proyecto ${project.title}.</p>
                    <a href="${project.watermark}" target="_blank" class="inline-flex items-center justify-center px-6 py-3 border border-transparent text-base font-medium rounded-lg text-white bg-emerald-600 hover:bg-emerald-700 transition-colors">
                        Acceder <i data-lucide="camera" class="ml-2 w-4 h-4"></i>
                    </a>
                </div>

                <!-- Informes Diarios -->
                <div class="tool-card bg-white rounded-2xl p-8 border border-slate-200 flex flex-col h-full">
                    <div class="mb-6 flex items-center justify-center w-16 h-16 bg-amber-50 text-amber-600 rounded-xl">
                        <i data-lucide="file-text" class="w-8 h-8"></i>
                    </div>
                    <h2 class="text-2xl font-bold text-slate-800 mb-3">Informes Diarios</h2>
                    <p class="text-slate-600 mb-8 flex-grow">Generador automático de informes diarios técnicos y operativos para ${project.title}.</p>
                    <a href="${project.reports}" target="_blank" class="inline-flex items-center justify-center px-6 py-3 border border-transparent text-base font-medium rounded-lg text-white bg-amber-600 hover:bg-amber-700 transition-colors">
                        Generar Informe <i data-lucide="file-plus" class="ml-2 w-4 h-4"></i>
                    </a>
                </div>

                <!-- Curva S -->
                <div class="tool-card bg-white rounded-2xl p-8 border border-slate-200 flex flex-col h-full shadow-sm">
                    <div class="mb-6 flex items-center justify-center w-16 h-16 bg-blue-50 text-blue-600 rounded-xl">
                        <i data-lucide="trending-up" class="w-8 h-8"></i>
                    </div>
                    <h2 class="text-2xl font-bold text-slate-800 mb-3">Curva S</h2>
                    <p class="text-slate-600 mb-8 flex-grow">Sistema de seguimiento de progreso de proyecto según cronograma para ${project.title}.</p>
                    <a href="${project.curveS}" target="_blank" class="inline-flex items-center justify-center px-6 py-3 border border-transparent text-base font-medium rounded-lg text-white bg-blue-600 hover:bg-blue-700 transition-colors">
                        Abrir sistema de seguimiento <i data-lucide="external-link" class="ml-2 w-4 h-4"></i>
                    </a>
                </div>

                <!-- Kilometraje -->
                <div class="tool-card bg-white rounded-2xl p-8 border border-slate-200 flex flex-col h-full shadow-sm">
                    <div class="mb-6 flex items-center justify-center w-16 h-16 bg-emerald-50 text-emerald-600 rounded-xl">
                        <i data-lucide="car" class="w-8 h-8"></i>
                    </div>
                    <h2 class="text-2xl font-bold text-slate-800 mb-3">Kilometraje</h2>
                    <p class="text-slate-600 mb-8 flex-grow">Formulario para ingresar kilometraje en proyecto ${project.title}.</p>
                    <a href="${project.kilometraje}" target="_blank" class="inline-flex items-center justify-center px-6 py-3 border border-transparent text-base font-medium rounded-lg text-white bg-emerald-600 hover:bg-emerald-700 transition-colors">
                        Registrar cierre de día <i data-lucide="plus-circle" class="ml-2 w-4 h-4"></i>
                    </a>
                </div>
            `;
            
            lucide.createIcons();
        }

        // Cargar proyecto por defecto (Tecales)
        window.onload = () => showProject('tecales');
    </script>
</body>
</html>
